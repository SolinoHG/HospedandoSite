<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Snake - HegueZone</title>

  <style>
    body {
      margin: 0;
      background: radial-gradient(circle, #0f2027, #0a0f1c);
      color: #00ffff;
      font-family: Arial;
      text-align: center;
    }

    h1 {
      margin-top: 20px;
      text-shadow: 0 0 10px #00ffff;
    }

    canvas {
      background: #000;
      border: 2px solid #00ffff;
      box-shadow: 0 0 20px #00ffff;
      margin-top: 20px;
    }

    .hud {
      margin-top: 10px;
      font-size: 18px;
    }

    .game-over {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.9);
      color: white;
      justify-content: center;
      align-items: center;
      flex-direction: column;
    }

    .game-over button {
      padding: 10px 20px;
      background: #00ffff;
      border: none;
      cursor: pointer;
      font-weight: bold;
      margin-top: 15px;
      box-shadow: 0 0 10px #00ffff;
    }

    .game-over button:hover {
      background: #00cccc;
    }
  </style>
</head>
<body>

<h1>🐍 Snake - HegueZone</h1>

<div class="hud">
  Pontuação: <span id="score">0</span> |
  Recorde: <span id="highscore">0</span>
</div>

<canvas id="game" width="400" height="400"></canvas>

<div class="game-over" id="gameOver">
  <h2>💀 Game Over</h2>
  <p id="finalScore"></p>
  <button onclick="restartGame()">Jogar Novamente</button>
</div>

<script src="snake.js"></script>
</body>
</html>
